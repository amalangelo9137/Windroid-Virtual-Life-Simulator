name: Discord Release Notify

on:
  release:
    types: [published]
  # Note: GitHub Actions does not have a direct 'transferred' trigger for workflows 
  # running inside the repo being transferred, as the workflow moves with the repo.
  # Transfers are usually best monitored by an external service or organization owner.

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Release Notification
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          color: "5814783"
          username: "GitHub Releases"
          content: "||@everyone||" # Optional: Remove this line if you don't want to ping everyone
          footer_title: "Released by ${{ github.actor }}"
          reduce_headings: true
